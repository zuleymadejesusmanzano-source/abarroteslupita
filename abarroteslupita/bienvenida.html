<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida - Abarrotes LUPITA</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-section">
            <div class="logo-icon"><i class="fas fa-store"></i></div>
            <div class="logo-text">
                <h1>Abarrotes</h1>
                <h1 class="brand-name">LUPITA</h1>
            </div>
        </div>
        <nav class="nav-menu">
            <button class="nav-btn" onclick="location.href='index.html'">Inicio</button>
            <button class="nav-btn" onclick="location.href='pedidos.html'">Pedidos</button>
            <button class="nav-btn" onclick="location.href='clients.html'">Clientes</button>
            <button class="nav-btn" onclick="location.href='reportes.html'">Reportes</button>
        </nav>
        <div class="user-welcome">
            <button class="welcome-btn active">Bienvenida</button>
        </div>
    </header>

    <main class="content-section" style="padding: 40px 24px; text-align: center;">
        <div style="max-width: 720px; margin: 0 auto; background: #fff; border-radius: 16px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); padding: 36px;">
            <h2>Bienvenido a Abarrotes LUPITA</h2>
            <p style="color:#666; font-size:1rem; line-height:1.7; margin:20px 0;">
                Gracias por visitar nuestra tienda en línea. Aquí puedes ver tus opciones de pedido, revisar tus artículos y continuar con tu compra.
            </p>
            <div style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:24px;">
                <button class="btn-action btn-red-gradient" onclick="location.href='index.html'">Ir al Catálogo</button>
                <button class="btn-action" onclick="location.href='tienda.html'">Nuevo Pedido</button>
                <button class="btn-action btn-dark" onclick="location.href='pedidos.html'">Ver Pedidos</button>
            </div>
        </div>
    </main>

</body>
</html>
